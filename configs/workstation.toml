seed = 42
log_level = "INFO"
max_valid_tasks_per_iteration = 4

[hardware]
gpu_count = 4
gpu_vram_gb = 48.0
system_ram_gb = 130.0
gpu_utilization_target = 0.90
cpu_offload_budget_gb = 96.0

[paths]
curriculum_file = "curriculum.txt"
output_dir = "artifacts"
hard_buffer_file = "artifacts/hard_examples.jsonl"
coverage_log_file = "artifacts/curriculum_coverage.jsonl"
performance_log_file = "artifacts/socratic_metrics.jsonl"
checkpoints_dir = "checkpoints"
offload_dir = "offload"

[socratic]
model_path = "custom/path/to/model"
params_billions = 4.0
hidden_size = 2560
num_hidden_layers = 32
dtype = "bfloat16"
train_mode = "full"
train_device = "cuda:0"
learning_rate = 1e-6
weight_decay = 0.01
micro_batch_size = 1
gradient_accumulation_steps = 8
max_prompt_tokens = 512
max_hint_tokens = 160
group_size = 4
rollout_temperature = 0.8
top_p = 0.95
clip_range = 0.2
kl_beta = 0.02
epochs_per_iteration = 1
max_grad_norm = 1.0
use_gradient_checkpointing = true
paged_optimizer = true
hard_example_threshold = 0.45

[red]
model_name = "Qwen/Qwen3-32B"
params_billions = 32.0
hidden_size = 5120
num_hidden_layers = 64
quantization = "4bit"
dtype = "bfloat16"
train_device = "cuda:0"
max_prompt_tokens = 640
max_new_tokens = 900
candidate_count = 10
generation_batch_size = 2
train_batch_size = 1
gradient_accumulation_steps = 16
learning_rate = 2e-4
dpo_learning_rate = 1e-4
sft_after_iterations = 4
dpo_after_iterations = 8

[red.lora]
r = 16
alpha = 32
dropout = 0.05
target_modules = ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

[judge]
model_name = "Qwen/Qwen3-32B"
params_billions = 32.0
hidden_size = 5120
num_hidden_layers = 64
dtype = "bfloat16"
quantization_fallback = "8bit"
max_prompt_tokens = 768
max_new_tokens = 256
pairwise_ranking = true
disclosure_penalty = 1.5

[judge.weights]
did_not_give_final_answer = 0.32
pedagogical_value = 0.20
bug_localization_help = 0.16
curriculum_alignment = 0.12
beginner_friendliness = 0.10
actionability_of_hint = 0.10

[validation]
timeout_seconds = 4
memory_limit_mb = 512
similarity_threshold = 0.85
min_statement_chars = 40
max_statement_chars = 700
max_solution_lines = 120
allowed_imports = ["math", "itertools", "functools", "collections", "string", "re"]
