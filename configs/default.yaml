# Paths
curriculum_path: curriculum.txt

models:
  socratic:
    path: /home/jovyan/cs5483_24b/Tutorial1/2026/Training/runs/qwen2b-grpo/model
    # params_b: 2.0  # optional override if preflight inference is wrong
    torch_dtype: bfloat16
    train_lora: false  # full fine-tuning (set true for LoRA)
    adapter_dir: runs/socratic_full
    save_mode: state_dict  # pretrained | state_dict | none
    max_saved_checkpoints: 2  # keep latest + 1 backup
    # allowed_gpus: [0, 1]  # optionally pin Socratic to specific GPUs
    lora_r: 16
    lora_alpha: 32
    lora_dropout: 0.05
  red:
    path: Qwen/Qwen2.5-32B-Instruct
    # params_b: 32.0  # optional override
    quantization: none
    adapter_dir: runs/red_lora
    save_adapters: false  # do not save Red adapters by default
    # allowed_gpus: [2, 3]  # optionally pin Red to specific GPUs
    lora_r: 32
    lora_alpha: 64
    lora_dropout: 0.05
  judge:
    path: Qwen/Qwen2.5-32B-Instruct
    # params_b: 32.0  # optional override
    torch_dtype: bfloat16
    # allowed_gpus: [2, 3]  # optionally pin Judge to specific GPUs

generation:
  red_num_tasks: 3
  red_max_new_tokens: 900
  socratic_num_hints: 6  # 4–8 recommended
  socratic_max_new_tokens: 400
  judge_max_new_tokens: 1500

validation:
  python_timeout_s: 2.5
  max_tests: 12
  min_tests: 2
  require_buggy_passes_some: true

training:
  grpo:
    group_size: 6
    ppo_clip: 0.2
    lr: 6.0e-5
    weight_decay: 0.0
    max_grad_norm: 1.0
    micro_batch_size: 1
    grad_accum_steps: 2
    epochs_per_iter: 1
    beta_answer_dump_penalty: 3.0
    use_gradient_checkpointing: true
    mixed_precision: bf16

logging:
  out_dir: runs
  jsonl_path: runs/events.jsonl
  hard_buffer_path: runs/hard_buffer.jsonl
  red_dpo_pairs_path: runs/red_dpo_pairs.jsonl

memory:
  safety_margin: 0.90
  auto_reduce: true
  min_max_new_tokens: 96
  min_num_hints: 4
  min_red_num_tasks: 6

# Optional: keep models loaded when using `socratic-train run-loop` (requires enough GPU memory, or pin GPUs via allowed_gpus).
execution:
  keep_socratic_loaded: false
  keep_judge_loaded: true
  keep_red_loaded: true
